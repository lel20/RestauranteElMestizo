<!-- menu/templates/menu/index.html -->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de inicio del menú</title>
</head>
<body>
    <h1>Bienvenido al menú principal</h1>
    
    <p>Esta es la página de inicio del menú de tu proyecto.</p>
    <h1>Lista de Entrantes</h1>
     {% for entrante in entrantes %}
    <ul>
            <li>
                <strong>Nombre:</strong> {{ entrante.nombre }}<br>
                <strong>Precio:</strong> {{ entrante.precio }}<br>
                <strong>Disponibilidad:</strong> {{ entrante.disponibilidad }}<br>
                <strong>Imagen:</strong> <img src="{{ entrante.imagen }}" alt="{{ entrante.nombre }}">
            </li>
        
    </ul>
    {% endfor %}
</body>
</html>
